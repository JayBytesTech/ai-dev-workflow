vault_path = "/path/to/ObsidianVault"
templates_dir = "Templates"
dev_log_template = "AIW_Dev_Log.md"
adr_template = "AIW_ADR.md"
default_transcript_root = "AI Sessions/raw"
default_dev_log_root = "Dev Logs"
default_adr_root = "ADR"

[tools.claude]
executable = "claude-code"

[tools.gemini]
executable = "gemini"

[tools.codex]
executable = "codex"

[projects.ai-hub]
display_name = "AI Hub"
repo_root = "/path/to/projects/ai-hub"
dev_logs_dir = "Dev Logs/AI Hub"
adr_dir = "ADR/AI Hub"
transcript_dir = "AI Sessions/raw/AI Hub"
allowed_note_folders = ["Projects/AI Hub", "Research"]

[profiles.ci]
# Optional profile overrides selected with `--profile ci` or `AIW_PROFILE=ci`.
# Useful for CI runners and automation paths.
vault_path = "/path/to/ObsidianVault-CI"

[profiles.ci.tools.codex]
executable = "codex"

[profiles.ci.projects.ai-hub]
transcript_dir = "AI Sessions/raw/AI Hub/CI"
